apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "person-service-rust.fullname" . }}-migrate-{{ .Release.Revision }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "1"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  template:
    spec:
      containers:
        - name: migrate
          image: "{{ .Values.image.repository }}-migration:{{ .Values.image.tag }}"
          command: ["sqlx", "migrate", "run"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: person-service-secrets
                  key: DATABASE_URL
      restartPolicy: OnFailure