apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "person-service-rust.fullname" . }}
spec:
  # ... selector and template metadata ...
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }} # This was missing!
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: person-service-secrets
                  key: DATABASE_URL