apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "person-service-rust.fullname" . }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "person-service-rust.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "person-service-rust.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: {{ .Chart.Name }}
          # Ensure your values.yaml has image.repository and image.tag defined
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: person-service-secrets
                  key: DATABASE_URL